spring.application.name=api-gateway


server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: property-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/properties/**
        - id: booking-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/bookings/**
        - id: guest-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/guests/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods: "*"
            allowedHeaders: "*"