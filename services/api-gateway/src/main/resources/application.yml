server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: property-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/property/**

            - id: booking-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/booking/**

            - id: guest-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/guest/**

          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origin-patterns: "*"
                allowed-methods: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
                allowed-headers: "*"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
logging:
  level:
    '[org.springframework.cloud.gateway]': DEBUG
    '[org.springframework.web]': DEBUG
    '[reactor.netty.http.server]': DEBUG
    '[reactor.netty.http.client]': DEBUG